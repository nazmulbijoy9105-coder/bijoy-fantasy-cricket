services:
  - type: web
    name: bpl-cricket-api
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt && python -m database.migrate
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_PATH
        value: /opt/render/project/src/bpl.db
    healthCheckPath: /health
